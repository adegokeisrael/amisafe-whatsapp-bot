version: "3.8"

services:
  amisafe-bot:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - amisafe_data:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  amisafe_data:
